name: Scrape Basketaki Data

on:
  schedule:
    # Runs every 3 days at 06:00 UTC
    - cron: '0 6 */3 * *'
  push:
    branches: [ main ]
    paths:
      # Also re-run if scrape.py or players.csv changes
      - 'scrape.py'
      - 'players.csv'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        run: python scrape.py

      - name: Send match notification
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python notify.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json last_notified.json
          # Only commit if anything actually changed
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: update data.json + last_notified.json [skip ci]"
            git pull --rebase origin main
            git push
          fi
